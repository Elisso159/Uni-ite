<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Διαχείριση Γευμάτων</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        <h1>Admin Dashboard</h1>

        <!-- Δ1. Συνολικά Στατιστικά -->
        <section class="card stats">
            <h2>Συνολικά Στατιστικά (Τελευταίος Μήνας)</h2>
            <div class="stat-value">1.240</div>
            <p>Συνολικές μερίδες που διαμοιράστηκαν</p>
        </section>

        <!-- Δ2. Κατάταξη Χρηστών -->
        <div class="grid-container">
            <section class="card">
                <h2>Top Donor Φοιτητής</h2>
                <div class="highlight">
                    <p class="name">Γιώργος Παπαδόπουλος</p>
                    <p class="score">85 μερίδες</p>
                </div>
            </section>

            <section class="card">
                <h2>Γεύματα με Υψηλότερη Αξιολόγηση</h2>
                <ul>
                    <li>Μακαρόνια με κιμά - <span>4.9/5</span></li>
                    <li>Φακές σούπα - <span>4.8/5</span></li>
                    <li>Κοτόπουλο με ρύζι - <span>4.7/5</span></li>
                </ul>
            </section>
        </div>
    </div>

</body>
</html>
